<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <link href="../assets/css/global.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <title>Blog Manager | Shudh India</title>
</head>
<body class="shudh-admin-body bg-[#131313] text-[#e5e2e1]">
<main class="ml-64 mt-14 md:mt-16 px-3 sm:px-5 md:px-8 pb-[max(1rem,env(safe-area-inset-bottom))] min-h-[calc(100dvh-3.5rem)] md:min-h-[calc(100vh-4rem)] overflow-y-auto max-w-full min-w-0">
  <div class="max-w-7xl mx-auto py-4 sm:py-6 lg:py-8 space-y-6">
    <section>
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-2">Blog Manager</h2>
      <p class="text-stone-400 text-sm sm:text-base">Create and manage dynamic blog posts shown on the website blog page.</p>
    </section>

    <section class="grid grid-cols-1 xl:grid-cols-2 gap-6">
      <div class="bg-surface-container-high rounded-2xl p-5 sm:p-6 space-y-4 border border-stone-800/40">
        <h4 class="text-base sm:text-lg font-bold">Create / Edit Blog Post</h4>
        <form id="blog-form" class="space-y-3">
          <input id="blog-id" type="hidden"/>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <input id="blog-title" type="text" placeholder="Post title" class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm"/>
            <input id="blog-category" type="text" placeholder="Category (e.g. Masterclass)" class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm"/>
          </div>
          <textarea id="blog-excerpt" rows="2" placeholder="Short excerpt..." class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm"></textarea>
          <textarea id="blog-content" rows="8" placeholder="Full blog content..." class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm"></textarea>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <input id="blog-cover" type="url" placeholder="Cover image URL" class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm"/>
            <input id="blog-order" type="number" min="0" step="1" placeholder="Display order" class="w-full bg-surface-container-highest border-none rounded-xl px-4 py-3 text-sm"/>
          </div>
          <label class="inline-flex items-center gap-2 text-sm text-stone-300"><input id="blog-visible" type="checkbox" checked class="rounded border-stone-700 bg-stone-900"/> Published</label>
          <div class="flex items-center gap-3">
            <button type="submit" class="px-5 py-3 rounded-xl bg-secondary text-on-secondary font-bold text-sm">Save Post</button>
            <button id="blog-edit-cancel" type="button" class="px-4 py-3 rounded-xl border border-stone-700 text-stone-300 text-sm hidden">Cancel Edit</button>
            <p id="blog-msg" class="text-xs text-secondary"></p>
          </div>
        </form>
      </div>

      <div class="bg-surface-container-high rounded-2xl p-5 sm:p-6 space-y-4 border border-stone-800/40">
        <h4 class="text-base sm:text-lg font-bold">Blog Posts</h4>
        <div id="blog-admin-list" class="space-y-3"></div>
      </div>
    </section>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/admin-auth-guard.js"></script>
<script src="../assets/js/admin-shell.js"></script>
<script src="../assets/js/admin-app.js"></script>
</body>
</html>
