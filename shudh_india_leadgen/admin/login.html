<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="../assets/css/global.css" rel="stylesheet"/>
<title>Admin Login | Shudh India</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#af101a",
        "primary-container": "#8c0d15",
        "secondary": "#86c78a",
        "secondary-container": "#1b5e20",
        "on-secondary": "#ffffff",
        "surface": "#131313",
        "surface-container": "#1b1b1b",
        "surface-container-high": "#222222",
        "surface-container-highest": "#2c2c2c",
        "on-surface": "#eceae4",
        "on-surface-variant": "#9f9b91",
        "outline-variant": "#343434"
      },
      fontFamily: { headline: ["Plus Jakarta Sans"], body: ["Inter"] }
    }
  }
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background: #131313; }
  .glow { box-shadow: 0 20px 55px rgba(91, 64, 61, 0.16); }
  .login-spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(27, 94, 32, 0.25);
    border-top-color: #1b5e20;
    border-radius: 999px;
    animation: spin 800ms linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body class="shudh-site-body shudh-admin-body min-h-screen flex items-center justify-center px-4 py-6 sm:py-10 bg-surface pb-[max(2rem,env(safe-area-inset-bottom))]">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-secondary/10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-primary/10 rounded-full blur-[100px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-[26rem] mx-auto">
    <div class="text-center mb-7 sm:mb-8">
      <div class="text-3xl sm:text-[2.05rem] leading-none font-headline font-bold text-secondary tracking-[0.18em] uppercase mb-2">Shudh India</div>
      <div class="text-xs text-stone-500 tracking-[0.3em] uppercase">Admin Portal</div>
    </div>

    <div class="bg-gradient-to-b from-surface-container-high to-surface-container rounded-3xl p-6 sm:p-8 border border-outline-variant glow">
      <h2 class="text-2xl font-headline font-bold text-on-surface text-center mb-1">Welcome back</h2>
      <p class="text-sm text-stone-500 mb-6 text-center">Sign in to continue to dashboard</p>

      <form id="login-form" class="space-y-5">
        <div class="space-y-2">
          <label class="block pl-1 text-[11px] font-bold uppercase tracking-[0.16em] text-stone-500">Email Address</label>
          <input id="email" type="email" autocomplete="email" required
            class="w-full h-12 bg-surface-container-high border border-outline-variant rounded-2xl px-5 text-sm text-on-surface placeholder:text-stone-600 focus:ring-1 focus:ring-secondary/35 transition-all"
            placeholder="admin@example.com"/>
        </div>
        <div class="space-y-2">
          <label class="block pl-1 text-[11px] font-bold uppercase tracking-[0.16em] text-stone-500">Password</label>
          <div class="relative">
            <input id="password" type="password" autocomplete="current-password" required
              class="w-full h-12 bg-surface-container-high border border-outline-variant rounded-2xl px-5 pr-12 text-sm text-on-surface placeholder:text-stone-600 focus:ring-1 focus:ring-secondary/35 transition-all"
              placeholder="Password"/>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full grid place-items-center text-stone-500 hover:text-stone-300 hover:bg-stone-700/30 transition-colors">
              <span class="material-symbols-outlined text-lg" id="pwd-icon">visibility_off</span>
            </button>
          </div>
        </div>
        <div id="error-msg" class="hidden text-red-400 text-sm text-center bg-red-400/10 rounded-xl py-2 px-4"></div>
        <button type="submit" id="login-submit"
          class="w-full py-4 bg-gradient-to-r from-secondary to-secondary-container text-on-secondary font-bold rounded-2xl hover:opacity-90 disabled:opacity-70 disabled:cursor-not-allowed transition-all shadow-xl shadow-secondary/20 text-sm tracking-wider uppercase inline-flex items-center justify-center gap-2">
          <span class="hidden login-spinner" id="login-spinner" aria-hidden="true"></span>
          <span id="login-submit-text">Sign In</span>
        </button>
      </form>
    </div>

    <div class="mt-5 text-center">
      <a href="../website/index.html" class="text-stone-600 hover:text-stone-400 text-xs tracking-wider transition-colors inline-flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Back to Website
      </a>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="../assets/js/firebase-config.js"></script>
<script src="../assets/js/admin-auth-guard.js"></script>
<script>
function togglePwd() {
  var input = document.getElementById("password");
  var icon = document.getElementById("pwd-icon");
  if (input.type === "password") {
    input.type = "text";
    icon.textContent = "visibility";
  } else {
    input.type = "password";
    icon.textContent = "visibility_off";
  }
}

document.getElementById("login-form").addEventListener("submit", function (e) {
  e.preventDefault();
  var email = document.getElementById("email").value.trim();
  var password = document.getElementById("password").value;
  var err = document.getElementById("error-msg");
  var submitBtn = document.getElementById("login-submit");
  var submitText = document.getElementById("login-submit-text");
  var submitSpinner = document.getElementById("login-spinner");
  err.classList.add("hidden");
  submitBtn.disabled = true;
  submitText.textContent = "Signing In...";
  submitSpinner.classList.remove("hidden");
  if (!firebase.apps.length) firebase.initializeApp(window.SHUDH_CONFIG.firebase);
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(function () {
      window.location.href = "dashboard.html";
    })
    .catch(function (ex) {
      err.textContent = ex.message || "Sign-in failed.";
      err.classList.remove("hidden");
      submitBtn.disabled = false;
      submitText.textContent = "Sign In";
      submitSpinner.classList.add("hidden");
    });
});
</script>
</body>
</html>
