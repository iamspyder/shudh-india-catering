<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Login | Shudh India</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "secondary": "#e9c349",
        "secondary-container": "#af8d11",
        "on-secondary": "#3c2f00",
        "surface": "#131313",
        "surface-container": "#201f1f",
        "surface-container-high": "#2a2a2a",
        "surface-container-highest": "#353534",
        "on-surface": "#e5e2e1",
        "on-surface-variant": "#d6c2c1",
        "outline-variant": "#514443",
        "primary-container": "#340000",
        "on-primary-container": "#e34836",
      },
      fontFamily: { headline: ["Manrope"], body: ["Manrope"] }
    }
  }
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { background: #0e0e0e; }
  .glow { box-shadow: 0 0 80px rgba(233,195,73,0.06); }
</style>
</head>
<body class="min-h-screen flex items-center justify-center px-4 bg-[#0e0e0e]">
  <!-- Background ornament -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-[#e9c349]/5 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-[#340000]/60 rounded-full blur-[100px]"></div>
  </div>

  <div class="relative z-10 w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="text-3xl font-headline font-bold text-[#e9c349] tracking-widest uppercase mb-1">Shudh India</div>
      <div class="text-xs text-stone-500 tracking-[0.3em] uppercase">Admin Portal</div>
    </div>

    <!-- Card -->
    <div class="bg-[#1c1b1b] rounded-3xl p-10 border border-stone-800/40 glow">
      <h2 class="text-2xl font-headline font-bold text-on-surface mb-2">Welcome back</h2>
      <p class="text-stone-500 text-sm mb-10">Sign in to manage your catering platform</p>

      <form onsubmit="handleLogin(event)" class="space-y-7">
        <!-- Email -->
        <div class="space-y-2">
          <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-500">Email Address</label>
          <input id="email" type="email" placeholder="admin@shudhindiacatering.com"
            class="w-full bg-[#2a2a2a] border-none rounded-2xl py-3.5 px-5 text-sm text-on-surface placeholder:text-stone-600 focus:ring-1 focus:ring-[#e9c349]/40 transition-all"/>
        </div>
        <!-- Password -->
        <div class="space-y-2">
          <label class="text-[10px] font-bold uppercase tracking-[0.2em] text-stone-500">Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="Enter your password"
              class="w-full bg-[#2a2a2a] border-none rounded-2xl py-3.5 px-5 pr-12 text-sm text-on-surface placeholder:text-stone-600 focus:ring-1 focus:ring-[#e9c349]/40 transition-all"/>
            <button type="button" onclick="togglePwd()" class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-500 hover:text-stone-300 transition-colors">
              <span class="material-symbols-outlined text-lg" id="pwd-icon">visibility_off</span>
            </button>
          </div>
        </div>
        <!-- Remember -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" class="rounded bg-[#2a2a2a] border-stone-700 text-[#e9c349] focus:ring-[#e9c349]/40"/>
            <span class="text-sm text-stone-400">Remember me</span>
          </label>
          <a href="#" class="text-sm text-[#e9c349] hover:text-yellow-300 transition-colors">Forgot password?</a>
        </div>
        <!-- Error -->
        <div id="error-msg" class="hidden text-red-400 text-sm text-center bg-red-400/10 rounded-xl py-2 px-4"></div>
        <!-- Submit -->
        <button type="submit"
          class="w-full py-4 bg-gradient-to-r from-secondary to-secondary-container text-on-secondary font-bold rounded-2xl hover:opacity-90 active:scale-98 transition-all shadow-xl shadow-secondary/10 text-sm tracking-wider uppercase">
          Sign In
        </button>
      </form>
    </div>

    <!-- Demo hint -->
    <div class="mt-6 text-center">
      <p class="text-stone-600 text-xs">Demo: any email + password <span class="text-stone-500">"admin123"</span></p>
    </div>

    <!-- Back to website -->
    <div class="mt-4 text-center">
      <a href="../website/index.html" class="text-stone-600 hover:text-stone-400 text-xs tracking-wider transition-colors flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-sm">arrow_back</span>
        Back to Website
      </a>
    </div>
  </div>

<script>
function togglePwd() {
  const input = document.getElementById('password');
  const icon = document.getElementById('pwd-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.textContent = 'visibility';
  } else {
    input.type = 'password';
    icon.textContent = 'visibility_off';
  }
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const err = document.getElementById('error-msg');

  if (!email || !password) {
    err.textContent = 'Please enter your email and password.';
    err.classList.remove('hidden');
    return;
  }
  if (password !== 'admin123') {
    err.textContent = 'Incorrect password. Use "admin123" for the demo.';
    err.classList.remove('hidden');
    return;
  }
  // Success
  err.classList.add('hidden');
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
