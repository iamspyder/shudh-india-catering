<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Shudh India Catering - Premium corporate and event catering services offering authentic Indian and international cuisine. We provide hygienic, high-quality, and delicious food for weddings, office parties, and special occasions across India.">
    <title>Admin Dashboard - Shudh India</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../logo/shudh_india_logo.png">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>


</head>

<body>

    <header>
        <a href="../index.html" style="text-decoration: none;">
            <div class="brand"><i class="fas fa-utensils" style="margin-right:10px;"></i>Shudh India</div>
        </a>
        <div class="user-info" id="adminEmailDisplay">Admin Panel</div>
    </header>

    <div class="main-wrapper">

        <div id="loginCard" class="login-container">
            <div class="login-card">
                <h3>Admin Access</h3>
                <p style="color:#666; margin-bottom:20px; font-size:14px;">Please sign in to manage orders</p>
                <div style="text-align:left;">
                    <input id="email" placeholder="Admin Email" type="email">
                    <input id="password" type="password" placeholder="Secure Password">
                </div>
                <button onclick="login()">
                    Sign In <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>

        <div id="dashboard" class="container hidden">

            <div class="admin-tabs">
                <button onclick="switchTab('orders')" id="tab-orders" class="tab-btn active">Live Orders</button>
                <button onclick="switchTab('admins')" id="tab-admins" class="tab-btn hidden">Manage Admins</button>
            </div>

            <div id="section-orders">
                <h2 class="page-title">
                    Live Orders
                    <button onclick="manualRefresh(this)" class="secondary"
                        style="width:auto; padding:8px 15px; font-size:14px;">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </h2>
                <div id="orders"></div>
            </div>

            <div id="section-admins" class="hidden">
                <h2 class="page-title">Admin Management</h2>

                <div class="login-card"
                    style="max-width:100%; text-align:left; margin-bottom:30px; border-top: 5px solid var(--success);">
                    <h3 style="font-size:20px; margin-bottom:15px;"><i class="fas fa-user-plus"></i> Add New Admin</h3>

                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <input id="newAdminEmail" type="email" placeholder="Email" style="flex:1; margin-bottom:0;">
                        <input id="newAdminPassword" type="text" placeholder="Password (Min 6 chars)"
                            style="flex:1; margin-bottom:0;">
                        <select id="newAdminRole"
                            style="flex:1; padding:14px; border:1px solid #ddd; border-radius:8px; font-size:15px;">
                            <option value="admin">Normal Admin (manages order)</option>
                            <option value="super_admin">Super Admin (manages everything)</option>
                        </select>
                        <button onclick="addNewAdmin()" class="primary-action"
                            style="width:auto; padding:0 30px;">Create Account</button>
                    </div>

                </div>

                <div id="adminsList" style="display:grid; gap:15px;">
                </div>
            </div>

        </div>

    </div>

    <script src="../js/admin.js"></script>

</body>

</html>
